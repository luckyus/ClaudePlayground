<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Tic-Tac-Toe</title>
	<style>
		* {
			box-sizing: border-box;
			margin: 0;
			padding: 0;
		}

		body {
			font-family: system-ui, sans-serif;
			display: flex;
			flex-direction: column;
			align-items: center;
			justify-content: center;
			min-height: 100vh;
			background: #0f0f0f;
			color: #fff;
		}

		h1 {
			font-size: 2rem;
			letter-spacing: 0.1em;
			margin-bottom: 1rem;
			color: #e0e0e0;
		}

		h3 {
			font-size: 1.1rem;
			color: #888;
			letter-spacing: 0.05em;
			height: 1.3em;
			opacity: 0.8;
			font-weight: normal;
			font-family: 'Courier New', Courier, monospace;
			text-shadow: 0 0 5px #f87171, 0 0 10px #f87171, 0 0 20px #f87171;
			animation: glow 2s infinite alternate;
		}

		#you {
			font-size: 0.9rem;
			color: #666;
			margin-bottom: 0.5rem;
			height: 1.2em;
		}

		#status {
			font-size: 1.1rem;
			margin-bottom: 1.5rem;
			height: 1.5em;
			color: #aaa;
		}

		#status.winner {
			color: #4ade80;
			font-weight: bold;
		}

		#status.draw {
			color: #facc15;
			font-weight: bold;
		}

		#status.disconnected {
			color: #f87171;
			font-weight: bold;
		}

		#board {
			display: grid;
			grid-template-columns: repeat(3, 110px);
			grid-template-rows: repeat(3, 110px);
			gap: 8px;
		}

		.cell {
			background: #1e1e1e;
			border-radius: 12px;
			display: flex;
			align-items: center;
			justify-content: center;
			font-size: 3rem;
			cursor: pointer;
			transition: background 0.15s, transform 0.1s;
			user-select: none;
		}

		.cell:hover:not(.taken):not(.inactive) {
			background: #2a2a2a;
			transform: scale(1.04);
		}

		.cell.taken,
		.cell.inactive {
			cursor: default;
		}

		.cell.x {
			color: #60a5fa;
		}

		.cell.o {
			color: #f87171;
		}

		.cell.winning {
			background: #2d3a2d;
		}

		#restart {
			margin-top: 1.8rem;
			padding: 0.6rem 2rem;
			font-size: 1rem;
			background: #2a2a2a;
			color: #e0e0e0;
			border: 1px solid #444;
			border-radius: 8px;
			cursor: pointer;
			transition: background 0.15s;
		}

		#restart:hover {
			background: #3a3a3a;
		}
	</style>
</head>

<body>
	<h1>Tic-Tac-Toe 2026</h1>
	<h3>Justine vs. Pak Ho</h3>
	<div id="you"></div>
	<div id="status">Connecting…</div>
	<div id="board"></div>
	<button id="restart" style="display:none">Play Again</button>

	<script src="https://cdn.jsdelivr.net/npm/@microsoft/signalr@8/dist/browser/signalr.min.js"></script>
	<script src="game.js"></script>
</body>

</html>
