name: Build, Test, and Deploy

on:
  push:
    branches: [main]

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Build
        run: dotnet build TicTacToe/TicTacToe.csproj --configuration Release

      - name: Test
        run: dotnet test TicTacToe.Tests/TicTacToe.Tests.csproj

      - name: Publish
        run: dotnet publish TicTacToe/TicTacToe.csproj --configuration Release --output ./publish

      - name: Deploy to Azure
        uses: azure/webapps-deploy@v3
        with:
          app-name: tictactoe-lucky
          publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE }}
          package: ./publish
